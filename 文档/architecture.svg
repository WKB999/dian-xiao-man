<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" role="img">
  <title>店小满技术架构</title>
  <desc>三层架构：前端 SPA → Flask API 网关 → SQLite 持久层</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 前端层 -->
  <rect x="40" y="30" width="600" height="90" rx="16" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="60" y="52" fill="#0C447C" font-size="13" font-family="sans-serif" font-weight="500">Frontend (Vanilla JS SPA · 176KB)</text>
  <text class="ts" x="60" y="70" fill="#378ADD" font-size="12" font-family="sans-serif">商家端 9 modules · 学生端 4 modules · GPS + 地图双模选址 · 零框架依赖</text>
  
  <rect x="70" y="82" width="110" height="26" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="125" y="99" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">Dashboard</text>
  
  <rect x="190" y="82" width="110" height="26" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="245" y="99" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">Shop Manager</text>

  <rect x="310" y="82" width="110" height="26" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="365" y="99" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">AI Marketing</text>

  <rect x="430" y="82" width="110" height="26" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="485" y="99" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">Smart Pricing</text>

  <rect x="550" y="82" width="70" height="26" rx="6" fill="#fff" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="585" y="99" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">+ more</text>

  <!-- 箭头：前端→API -->
  <line x1="200" y1="120" x2="200" y2="155" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="120" x2="340" y2="155" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="120" x2="480" y2="155" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API 层 -->
  <rect x="40" y="160" width="600" height="140" rx="16" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="60" y="182" fill="#085041" font-size="13" font-family="sans-serif" font-weight="500">API Gateway (Flask · 16 endpoints · CORS · Token Auth)</text>
  <text class="ts" x="60" y="200" fill="#1D9E75" font-size="12" font-family="sans-serif">SHA-256 密码哈希 · shop_id 归属校验 · 全端点 Authorization 鉴权</text>

  <!-- API 节点行1 -->
  <rect x="60" y="216" width="85" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="102" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/auth</text>

  <rect x="150" y="216" width="85" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="192" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/shops</text>

  <rect x="240" y="216" width="95" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="287" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/products</text>

  <rect x="340" y="216" width="105" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="392" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/promotions</text>

  <rect x="450" y="216" width="85" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="492" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/messages</text>

  <rect x="540" y="216" width="90" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="585" y="234" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/orders</text>

  <!-- API 节点行2 -->
  <rect x="140" y="252" width="95" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="187" y="270" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/geocode</text>

  <rect x="240" y="252" width="115" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="297" y="270" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/sales-records</text>

  <rect x="360" y="252" width="70" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="395" y="270" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/stats</text>

  <rect x="435" y="252" width="70" height="28" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="470" y="270" text-anchor="middle" fill="#085041" font-size="11" font-family="sans-serif" font-weight="500">/api/me</text>

  <!-- 箭头：API→DB -->
  <line x1="200" y1="300" x2="200" y2="340" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="300" x2="340" y2="340" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="300" x2="480" y2="340" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 数据库层 -->
  <rect x="40" y="346" width="600" height="120" rx="16" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="th" x="60" y="368" fill="#633806" font-size="13" font-family="sans-serif" font-weight="500">Data Store (SQLite · WAL Mode · 7 Tables · ACID)</text>
  <text class="ts" x="60" y="386" fill="#BA7517" font-size="12" font-family="sans-serif">首次启动自动建表 + 6 店铺种子数据 · 外键关联 · 运行时迁移</text>

  <!-- DB 表节点 -->
  <rect x="60" y="402" width="78" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="99" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">users</text>

  <rect x="143" y="402" width="78" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="182" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">shops</text>

  <rect x="226" y="402" width="78" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="265" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">products</text>

  <rect x="309" y="402" width="85" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="351" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">promotions</text>

  <rect x="399" y="402" width="85" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="441" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">messages</text>

  <rect x="489" y="402" width="95" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="536" y="420" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">sales_records</text>

  <rect x="200" y="436" width="78" height="28" rx="6" fill="#fff" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="239" y="454" text-anchor="middle" fill="#633806" font-size="11" font-family="sans-serif" font-weight="500">orders</text>

  <!-- 左侧标注 -->
  <text x="18" y="78" text-anchor="middle" fill="#378ADD" font-size="11" font-family="sans-serif" font-weight="500">L1</text>
  <text x="18" y="233" text-anchor="middle" fill="#1D9E75" font-size="11" font-family="sans-serif" font-weight="500">L2</text>
  <text x="18" y="410" text-anchor="middle" fill="#BA7517" font-size="11" font-family="sans-serif" font-weight="500">L3</text>
</svg>